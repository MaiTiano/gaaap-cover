<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAAAP 小红书封面生成器</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: #0A0A0A; color: #F5F5F5;
  min-height: 100vh; display: flex; flex-direction: column;
}

.header {
  background: #0A0A0A; border-bottom: 2px solid #FFD600;
  padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
}
.header h1 { font-size: 20px; color: #FFD600; letter-spacing: 2px; }
.header .brand { font-size: 13px; color: #888; }

.main { display: flex; flex: 1; min-height: 0; overflow: hidden; }

.panel {
  width: 360px; background: #141414; border-right: 1px solid #222;
  padding: 18px; overflow-y: auto; flex-shrink: 0;
}
.panel h3 {
  font-size: 12px; color: #FFD600; margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 1px;
  border-bottom: 1px solid #2a2a2a; padding-bottom: 5px;
}

.template-selector { display: flex; gap: 6px; margin-bottom: 14px; }
.template-btn {
  flex: 1; padding: 8px 4px; background: #1C1C1E; border: 2px solid #333;
  color: #888; font-size: 12px; cursor: pointer; border-radius: 4px;
  transition: all 0.2s; text-align: center;
}
.template-btn:hover { border-color: #FFD600; color: #FFD600; }
.template-btn.active { border-color: #FFD600; color: #FFD600; background: #2a2500; }

.input-group { margin-bottom: 12px; }
.input-group label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; }
.input-group input[type="text"],
.input-group select,
.input-group textarea {
  width: 100%; padding: 8px 10px; background: #1C1C1E;
  border: 1px solid #333; color: #F5F5F5; font-size: 13px;
  border-radius: 4px; outline: none;
}
.input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: #FFD600; }
.input-group select { cursor: pointer; appearance: none; }
.input-group select option { background: #1C1C1E; color: #F5F5F5; }
.input-group textarea { resize: vertical; min-height: 44px; }

.font-preview {
  font-size: 14px; color: #FFD600; margin-top: 6px;
  padding: 6px 10px; background: #1C1C1E; border-radius: 4px; border: 1px solid #333;
}

.upload-area {
  border: 2px dashed #333; border-radius: 6px; padding: 16px;
  text-align: center; cursor: pointer; transition: all 0.2s;
  margin-bottom: 12px; background: #1C1C1E;
}
.upload-area:hover { border-color: #FFD600; }
.upload-area.dragover { border-color: #FFD600; background: #2a2500; }
.upload-area .icon { font-size: 24px; color: #FFD600; margin-bottom: 4px; }
.upload-area .text { font-size: 12px; color: #888; }
.upload-area .hint { font-size: 10px; color: #555; margin-top: 3px; }
.upload-area input[type="file"] { display: none; }

.photo-controls {
  display: none; background: #1C1C1E; border-radius: 6px;
  padding: 10px; margin-bottom: 12px; border: 1px solid #333;
}
.photo-controls.show { display: block; }
.photo-controls .control-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.photo-controls label { font-size: 11px; color: #888; width: 50px; flex-shrink: 0; }
.photo-controls input[type="range"] { flex: 1; accent-color: #FFD600; }
.photo-controls .value { font-size: 11px; color: #FFD600; width: 40px; text-align: right; }
.photo-controls .btn-row { display: flex; gap: 6px; margin-top: 6px; }
.photo-controls .btn-row button {
  flex: 1; padding: 5px; background: #333; border: none;
  color: #F5F5F5; font-size: 11px; border-radius: 3px; cursor: pointer;
}
.photo-controls .btn-row button:hover { background: #FFD600; color: #0A0A0A; }

.drag-hint {
  background: #2a2500; border: 1px solid #FFD600; border-radius: 4px;
  padding: 6px 10px; margin-bottom: 10px; font-size: 11px; color: #FFD600; display: none;
}
.drag-hint.show { display: block; }

.export-btn {
  width: 100%; padding: 12px; background: #FFD600;
  color: #0A0A0A; font-size: 14px; font-weight: bold;
  border: none; border-radius: 6px; cursor: pointer; margin-top: 6px;
}
.export-btn:hover { background: #e6c200; }

.preview-area {
  flex: 1; display: flex; justify-content: center; align-items: center;
  padding: 30px; background: #0A0A0A; overflow: auto;
}
.scale-wrapper { transform-origin: center center; }

.cover-render {
  width: 1080px; height: 1440px; position: relative;
  overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  flex-shrink: 0; background: #0A0A0A;
}

.watermark {
  position: absolute; bottom: 30px; right: 30px;
  font-size: 24px; font-weight: bold;
  color: rgba(255,255,255,0.5); letter-spacing: 2px; z-index: 20; pointer-events: none;
}

/* ===== 模板1：紧凑上下 ===== */
.tpl-1 { display: flex; flex-direction: column; }
.tpl-1 .text-area {
  height: 32%; display: flex; flex-direction: column;
  justify-content: center; align-items: center; padding: 30px 40px;
}
.tpl-1 .main-title {
  font-size: 72px; font-weight: bold; color: #FFD600;
  text-align: center; line-height: 1.15; margin-bottom: 16px; white-space: pre-line;
}
.tpl-1 .sub-title {
  font-size: 30px; color: #F5F5F5;
  text-align: center; line-height: 1.4; white-space: pre-line;
}
.tpl-1 .divider { width: 50%; height: 3px; background: #FFD600; margin-top: 20px; }
.tpl-1 .photo-area {
  height: 68%; position: relative; overflow: hidden; background: #0A0A0A;
}

/* ===== 模板2：紧凑左右 ===== */
.tpl-2 { display: flex; flex-direction: row; }
.tpl-2 .text-area {
  width: 35%; display: flex; flex-direction: column;
  justify-content: center; align-items: center; padding: 30px;
}
.tpl-2 .main-title {
  font-size: 58px; font-weight: bold; color: #FFD600;
  text-align: center; line-height: 1.2; white-space: pre-line;
}
.tpl-2 .sub-title {
  font-size: 24px; color: #F5F5F5; margin-top: 20px;
  text-align: center; white-space: pre-line;
}
.tpl-2 .photo-area {
  width: 65%; position: relative; overflow: hidden; background: #0A0A0A;
}

/* ===== 模板3：全图叠加 ===== */
.tpl-3 { position: relative; }
.tpl-3 .photo-area {
  position: absolute; inset: 0; overflow: hidden;
}
.tpl-3 .overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 45%;
  background: linear-gradient(to bottom, rgba(10,10,10,1) 0%, rgba(10,10,10,0.95) 30%, rgba(10,10,10,0.7) 70%, rgba(10,10,10,0) 100%);
  z-index: 5; pointer-events: none;
}
.tpl-3 .text-area {
  position: absolute; top: 0; left: 0; width: 100%; height: 40%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 40px; z-index: 6;
}
.tpl-3 .main-title {
  font-size: 64px; font-weight: bold; color: #FFD600;
  text-align: center; line-height: 1.15; margin-bottom: 16px; white-space: pre-line;
}
.tpl-3 .sub-title {
  font-size: 28px; color: #F5F5F5; text-align: center;
  line-height: 1.4; margin-bottom: 16px; white-space: pre-line;
}
.tpl-3 .divider { width: 50%; height: 3px; background: #FFD600; }

/* 照片区域通用 */
.photo-frame {
  position: absolute; overflow: hidden;
}
.photo-img {
  position: absolute; cursor: grab; user-select: none;
  -webkit-user-drag: none;
}
.photo-img:active { cursor: grabbing; }
.photo-placeholder {
  position: absolute; inset: 0; display: flex;
  justify-content: center; align-items: center; color: #333; font-size: 20px; letter-spacing: 2px;
}

.hidden { display: none !important; }

.loading {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  display: flex; justify-content: center; align-items: center; z-index: 1000;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.loading.show { opacity: 1; pointer-events: all; }
.loading-text { color: #FFD600; font-size: 16px; font-weight: bold; }

@media (max-width: 1200px) {
  .main { flex-direction: column; }
  .panel { width: 100%; border-right: none; border-bottom: 1px solid #222; }
  .cover-render { transform: scale(0.5); transform-origin: center top; }
}
</style>
</head>
<body>

<div class="header">
  <h1>GAAAP 小红书封面生成器</h1>
  <span class="brand">紧凑排版 · 黑底黄字 · 多图拼图</span>
</div>

<div class="main">
  <div class="panel">
    <h3>选择模板</h3>
    <div class="template-selector">
      <button class="template-btn active" data-template="1">紧凑上下</button>
      <button class="template-btn" data-template="2">紧凑左右</button>
      <button class="template-btn" data-template="3">全图叠加</button>
    </div>

    <h3>文字内容</h3>
    <div class="input-group">
      <label>主标题（黄色大字）</label>
      <textarea id="mainTitle" rows="2">44岁硬拉100kg</textarea>
    </div>
    <div class="input-group">
      <label>副标题（白色小字）</label>
      <textarea id="subTitle" rows="2">给20岁的自己一个交代</textarea>
    </div>

    <h3>字体选择</h3>
    <div class="input-group">
      <label>标题字体</label>
      <select id="titleFont">
        <option value="'PingFang SC', 'Microsoft YaHei', sans-serif">苹方 / 微软雅黑</option>
        <option value="'Impact', 'Arial Black', sans-serif">Impact（美式粗体）</option>
        <option value="'Arial Black', 'Arial', sans-serif">Arial Black</option>
        <option value="'SimHei', 'Microsoft YaHei', sans-serif">黑体</option>
        <option value="'SimSun', 'STSong', serif">宋体</option>
        <option value="'KaiTi', 'STKaiti', serif">楷体</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="monospace">等宽字体</option>
      </select>
      <div class="font-preview" id="titleFontPreview" style="font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;">GAAAP 字体预览</div>
    </div>
    <div class="input-group">
      <label>副标题字体</label>
      <select id="subFont">
        <option value="'PingFang SC', 'Microsoft YaHei', sans-serif">苹方 / 微软雅黑</option>
        <option value="'Impact', 'Arial Black', sans-serif">Impact（美式粗体）</option>
        <option value="'Arial', sans-serif">Arial</option>
        <option value="'SimHei', 'Microsoft YaHei', sans-serif">黑体</option>
        <option value="'SimSun', 'STSong', serif">宋体</option>
        <option value="'KaiTi', 'STKaiti', serif">楷体</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="monospace">等宽字体</option>
      </select>
      <div class="font-preview" id="subFontPreview" style="font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #F5F5F5;">副标题字体预览</div>
    </div>

    <h3>上传照片</h3>
    <div class="upload-area" id="uploadArea">
      <div class="icon">📷</div>
      <div class="text">点击或拖拽上传照片</div>
      <div class="hint">单张平铺 / 多张拼图</div>
      <input type="file" id="photoInput" accept="image/*" multiple>
    </div>

    <div class="drag-hint" id="dragHint">💡 在右边预览区拖拽图片调整位置</div>

    <div class="photo-controls" id="photoControls">
      <div class="control-row">
        <label>缩放</label>
        <input type="range" id="photoScale" min="50" max="200" value="100">
        <span class="value" id="scaleValue">100%</span>
      </div>
      <div class="btn-row">
        <button id="resetPhoto">重置位置</button>
        <button id="removePhoto">清空照片</button>
      </div>
    </div>

    <h3>导出</h3>
    <button class="export-btn" id="exportBtn">导出小红书封面</button>
  </div>

  <div class="preview-area" id="previewArea">
    <div class="scale-wrapper" id="scaleWrapper">
      <!-- 模板1：紧凑上下 -->
      <div class="cover-render tpl-1" id="tpl1">
        <div class="text-area">
          <div class="main-title" id="t1-main">44岁硬拉100kg</div>
          <div class="sub-title" id="t1-sub">给20岁的自己一个交代</div>
          <div class="divider"></div>
        </div>
        <div class="photo-area" id="t1-photo-area"></div>
        <div class="watermark">GAAAP</div>
      </div>
      <!-- 模板2：紧凑左右 -->
      <div class="cover-render tpl-2 hidden" id="tpl2">
        <div class="text-area">
          <div class="main-title" id="t2-main">年龄是<br>数字<br>力量是<br>选择</div>
          <div class="sub-title" id="t2-sub">GAAAP</div>
        </div>
        <div class="photo-area" id="t2-photo-area"></div>
        <div class="watermark">GAAAP</div>
      </div>
      <!-- 模板3：全图叠加 -->
      <div class="cover-render tpl-3 hidden" id="tpl3">
        <div class="photo-area" id="t3-photo-area"></div>
        <div class="overlay"></div>
        <div class="text-area">
          <div class="main-title" id="t3-main">3个月，体脂28%→18%</div>
          <div class="sub-title" id="t3-sub">44岁，身体在重启</div>
          <div class="divider"></div>
        </div>
        <div class="watermark">GAAAP</div>
      </div>
    </div>
  </div>
</div>

<div class="loading" id="loading"><div class="loading-text">正在生成...</div></div>

<script>
// ===================== 状态 =====================
let currentTemplate = 1;
let photos = []; // {src, naturalW, naturalH, left, top}
let photoScale = 100;
let isDragging = false, dragPhoto = null;
let dragStartX = 0, dragStartY = 0, dragPhotoStartLeft = 0, dragPhotoStartTop = 0;

const AREA_SIZE = {
  1: { w: 1080, h: 980 },   // 1440 * 0.68
  2: { w: 702, h: 1440 },   // 1080 * 0.65
  3: { w: 1080, h: 1440 }   // 全屏
};

// ===================== 模板切换 =====================
const templateBtns = document.querySelectorAll('.template-btn');
const templates = [null, document.getElementById('tpl1'), document.getElementById('tpl2'), document.getElementById('tpl3')];

templateBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    templateBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTemplate = parseInt(btn.dataset.template);
    templates.forEach((tpl, i) => { if (tpl) tpl.classList.toggle('hidden', i !== currentTemplate); });
    updateText(); applyFont(); rebuildLayout();
  });
});

// ===================== 文字 =====================
const mainIn = document.getElementById('mainTitle');
const subIn = document.getElementById('subTitle');
function updateText() {
  const m = mainIn.value, s = subIn.value;
  document.getElementById('t1-main').textContent = m;
  document.getElementById('t1-sub').textContent = s;
  document.getElementById('t2-main').innerHTML = m.replace(/\n/g, '<br>') || '年龄是<br>数字<br>力量是<br>选择';
  document.getElementById('t2-sub').textContent = s || 'GAAAP';
  document.getElementById('t3-main').textContent = m;
  document.getElementById('t3-sub').textContent = s;
}
mainIn.addEventListener('input', updateText);
subIn.addEventListener('input', updateText);

// ===================== 字体 =====================
const titleFontSel = document.getElementById('titleFont');
const subFontSel = document.getElementById('subFont');
function applyFont() {
  const tf = titleFontSel.value, sf = subFontSel.value;
  document.querySelectorAll('.main-title').forEach(el => el.style.fontFamily = tf);
  document.querySelectorAll('.sub-title').forEach(el => el.style.fontFamily = sf);
  document.getElementById('titleFontPreview').style.fontFamily = tf;
  document.getElementById('subFontPreview').style.fontFamily = sf;
}
titleFontSel.addEventListener('change', applyFont);
subFontSel.addEventListener('change', applyFont);

// ===================== 上传照片 =====================
const uploadArea = document.getElementById('uploadArea');
const photoInput = document.getElementById('photoInput');

uploadArea.addEventListener('click', () => photoInput.click());
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault(); uploadArea.classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (files.length) loadPhotos(files);
});
photoInput.addEventListener('change', e => { if (e.target.files.length) loadPhotos(Array.from(e.target.files)); });

function loadPhotos(files) {
  photos = []; let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        photos.push({ src: e.target.result, naturalW: img.naturalWidth, naturalH: img.naturalHeight, left: 0, top: 0 });
        loaded++; if (loaded === files.length) { showControls(); rebuildLayout(); }
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function showControls() {
  document.getElementById('photoControls').classList.add('show');
  document.getElementById('dragHint').classList.add('show');
}

// ===================== 重建布局 =====================
function rebuildLayout() {
  const area = document.getElementById(`t${currentTemplate}-photo-area`);
  if (!area) return;
  area.innerHTML = '';

  if (photos.length === 0) {
    const ph = document.createElement('div');
    ph.className = 'photo-placeholder';
    ph.textContent = '[ 照片区域 ]';
    area.appendChild(ph); return;
  }

  const sz = AREA_SIZE[currentTemplate];
  const cw = sz.w, ch = sz.h;
  const count = Math.min(photos.length, 4);

  for (let i = 0; i < count; i++) {
    const p = photos[i];
    const frame = document.createElement('div');
    frame.className = 'photo-frame';

    // 计算 frame 位置，无间隙填满
    let fx, fy, fw, fh;
    if (count === 1) {
      fx = 0; fy = 0; fw = cw; fh = ch;
    } else if (count === 2) {
      if (currentTemplate === 2) { // 竖向模板，上下分
        fx = 0; fy = i * ch / 2; fw = cw; fh = ch / 2;
      } else { // 横向模板，左右分
        fx = i * cw / 2; fy = 0; fw = cw / 2; fh = ch;
      }
    } else if (count === 3) {
      if (currentTemplate === 2) {
        // 左竖：上50% + 下25/25
        if (i === 0) { fx = 0; fy = 0; fw = cw; fh = ch / 2; }
        else { fx = (i - 1) * cw / 2; fy = ch / 2; fw = cw / 2; fh = ch / 2; }
      } else {
        // 上横：上50%全宽 + 下25/25
        if (i === 0) { fx = 0; fy = 0; fw = cw; fh = ch / 2; }
        else { fx = (i - 1) * cw / 2; fy = ch / 2; fw = cw / 2; fh = ch / 2; }
      }
    } else {
      // 4张 2x2 网格
      const col = i % 2, row = Math.floor(i / 2);
      fx = col * cw / 2; fy = row * ch / 2;
      fw = cw / 2; fh = ch / 2;
    }

    frame.style.cssText = `left:${fx}px;top:${fy}px;width:${fw}px;height:${fh}px;`;
    area.appendChild(frame);

    const img = document.createElement('img');
    img.className = 'photo-img';
    img.src = p.src;
    img.draggable = false;
    frame.appendChild(img);

    // cover 计算，保持比例
    const imgAspect = p.naturalW / p.naturalH;
    const frameAspect = fw / fh;
    let renderW, renderH;
    if (imgAspect > frameAspect) { renderH = fh; renderW = fh * imgAspect; }
    else { renderW = fw; renderH = fw / imgAspect; }

    const s = photoScale / 100;
    renderW *= s; renderH *= s;

    let left = (fw - renderW) / 2 + p.left;
    let top = (fh - renderH) / 2 + p.top;

    img.style.cssText = `width:${renderW}px;height:${renderH}px;left:${left}px;top:${top}px;`;

    img.addEventListener('mousedown', e => startDrag(e, p, img, fw, fh));
    img.addEventListener('touchstart', e => startDrag(e, p, img, fw, fh), { passive: false });
  }
}

// ===================== 拖拽 =====================
function startDrag(e, photo, img, frameW, frameH) {
  e.preventDefault();
  isDragging = true; dragPhoto = photo;
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  dragStartX = cx; dragStartY = cy;
  const imgRect = img.getBoundingClientRect();
  const parentRect = img.parentElement.getBoundingClientRect();
  dragPhotoStartLeft = imgRect.left - parentRect.left;
  dragPhotoStartTop = imgRect.top - parentRect.top;
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchmove', onDrag, { passive: false });
  document.addEventListener('touchend', endDrag);
}

function onDrag(e) {
  if (!isDragging || !dragPhoto) return; e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const dx = cx - dragStartX, dy = cy - dragStartY;
  const img = document.querySelector('.photo-img:active') || (dragPhoto && dragPhoto.lastImg);
  if (!img) return;
  const parent = img.parentElement;
  const imgW = img.offsetWidth, imgH = img.offsetHeight;
  const frameW = parent.offsetWidth, frameH = parent.offsetHeight;
  let newLeft = dragPhotoStartLeft + dx;
  let newTop = dragPhotoStartTop + dy;
  newLeft = Math.min(0, Math.max(newLeft, frameW - imgW));
  newTop = Math.min(0, Math.max(newTop, frameH - imgH));
  img.style.left = newLeft + 'px';
  img.style.top = newTop + 'px';
}

function endDrag(e) {
  if (!isDragging || !dragPhoto) return;
  const activeImg = document.querySelector('.photo-img:active');
  if (activeImg && activeImg.parentElement) {
    const parent = activeImg.parentElement;
    const imgRect = activeImg.getBoundingClientRect();
    const parentRect = parent.getBoundingClientRect();
    const centerOffX = (parent.offsetWidth - activeImg.offsetWidth) / 2;
    const centerOffY = (parent.offsetHeight - activeImg.offsetHeight) / 2;
    dragPhoto.left = (imgRect.left - parentRect.left) - centerOffX;
    dragPhoto.top = (imgRect.top - parentRect.top) - centerOffY;
  }
  isDragging = false; dragPhoto = null;
  document.removeEventListener('mousemove', onDrag);
  document.removeEventListener('mouseup', endDrag);
  document.removeEventListener('touchmove', onDrag);
  document.removeEventListener('touchend', endDrag);
}

// ===================== 缩放控制 =====================
const scaleInput = document.getElementById('photoScale');
scaleInput.addEventListener('input', e => {
  photoScale = parseInt(e.target.value);
  document.getElementById('scaleValue').textContent = photoScale + '%';
  rebuildLayout();
});

// ===================== 重置 / 清空 =====================
document.getElementById('resetPhoto').addEventListener('click', () => {
  photoScale = 100; scaleInput.value = 100;
  document.getElementById('scaleValue').textContent = '100%';
  photos.forEach(p => { p.left = 0; p.top = 0; });
  rebuildLayout();
});

document.getElementById('removePhoto').addEventListener('click', () => {
  photos = []; photoScale = 100; scaleInput.value = 100;
  document.getElementById('scaleValue').textContent = '100%';
  document.getElementById('photoControls').classList.remove('show');
  document.getElementById('dragHint').classList.remove('show');
  photoInput.value = ''; rebuildLayout();
});

// ===================== 导出 =====================
document.getElementById('exportBtn').addEventListener('click', async () => {
  const tpl = document.getElementById(`tpl${currentTemplate}`);
  if (!tpl) return;
  document.getElementById('loading').classList.add('show');
  try {
    const canvas = await html2canvas(tpl, {
      width: 1080, height: 1440, scale: 1,
      useCORS: true, allowTaint: true,
      backgroundColor: null, logging: false
    });
    const link = document.createElement('a');
    link.download = `GAAAP-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();
  } catch (err) { alert('导出失败：' + err.message); }
  finally { document.getElementById('loading').classList.remove('show'); }
});

// ===================== 预览缩放 =====================
function autoScale() {
  const pa = document.getElementById('previewArea');
  const sw = document.getElementById('scaleWrapper');
  const scale = Math.min((pa.clientWidth - 60) / 1080, (pa.clientHeight - 60) / 1440, 1);
  sw.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', autoScale);
window.addEventListener('load', autoScale);

// 初始化
updateText(); applyFont(); autoScale(); rebuildLayout();
</script>

</body>
